<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat — WhatsApp Bot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="phone">
  <div class="topbar">
    <div class="avatar">🤖</div>
    <div class="topbar-info">
      <strong>WhatsApp Bot</strong>
      <span class="status">online</span>
    </div>
  </div>

  <div class="messages" id="chatBox">
    <div class="date-chip">Today</div>
    <div class="msg bot">Hey! Try saying <b>hi</b> or <b>bye</b> 👋</div>
  </div>

  <div class="composer">
    <input type="text" id="messageInput" placeholder="Message" autocomplete="off">
    <button id="sendButton" aria-label="Send">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
